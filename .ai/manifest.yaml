# .ai/manifest.yaml — Universal AI Agent Configuration
#
# Source of truth. Agent configs generated by: ./scripts/sync-agents.sh

version: "1.1"
owner: "NickBevers"
role: "freelance frontend creative developer"

agents:
  claude:
    enabled: true
    output: "CLAUDE.md"
    rules_dir: "rules/"
    skills_dir: "skills/"
  cursor:
    enabled: false
    output: ".cursorrules"
  windsurf:
    enabled: false
    output: ".windsurfrules"
  copilot:
    enabled: false
    output: ".github/copilot-instructions.md"
  aider:
    enabled: false
    output: ".aider.conf.yml"

rules:
  - .ai/rules/principles.md
  - .ai/rules/frontend-development.md
  - .ai/rules/backend-development.md
  - .ai/rules/design.md
  - .ai/rules/copywriting.md
  - .ai/rules/security.md
  - .ai/rules/testing.md
  - .ai/rules/devops.md
  - .ai/rules/database.md
  - .ai/rules/ticketing.md
  - .ai/rules/planning.md
  - .ai/rules/research.md
  - .ai/rules/git.md
  - .ai/rules/laravel.md
  - .ai/rules/compliance.md
  - .ai/rules/incident.md

skills:
  - .ai/skills/stack-detect.md
  - .ai/skills/design-discovery.md
  - .ai/skills/micro-animations.md
  - .ai/skills/frontend-design.md
  - .ai/skills/code-review.md
  - .ai/skills/project-kickoff.md
  - .ai/skills/qa-audit.md
  - .ai/skills/proposal-writer.md
  - .ai/skills/seo-audit.md
  - .ai/skills/content-strategy.md
  - .ai/skills/document-generator.md
  - .ai/skills/threat-detection.md
  - .ai/skills/app-store-optimization.md
  - .ai/skills/behavioral-nudge.md
  - .ai/skills/workflow-optimizer.md
  - .ai/skills/analytics-reporter.md
  - .ai/skills/data-consolidation.md
  - .ai/skills/mcp-builder.md

tech:
  note: "Defaults for NEW projects only. Always defer to detected stack."
  runtime: "Bun (new). Yarn/npm for existing."
  package_manager: "Bun (preferred). Yarn/npm when project uses them."
  linter: "Oxlint"
  formatter: "Prettier"
  backend: "Hono"
  frontend: "Astro 6 + Preact"
  database: "PostgreSQL 16 + Drizzle ORM"
  styling: "CSS Modules"
  state: "Nanostores"
  icons: "Tabler Icons (only when user requests)"
  charts: "VisX"
